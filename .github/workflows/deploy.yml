name: Deploy SeaChess Server

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - '.github/workflows/deploy.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore server/SeaChess.server.slnx

      - name: Build
        run: dotnet build server/SeaChess.server.slnx --no-restore -c Release

      - name: Test
        run: dotnet test server/SeaChess.server.slnx --no-build -c Release --verbosity normal

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 24700
          script: |
            cd ~/SeaChess

            # Pull latest code
            git pull origin master

            # Rebuild & restart containers
            docker compose down
            docker compose up -d --build

            # Clean up old images
            docker image prune -f

            echo "✅ Deploy successful!"